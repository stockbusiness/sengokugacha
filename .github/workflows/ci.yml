name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      SESSION_SECRET: dummy
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: dummy
      ADMIN_PASSWORD: dummy
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
